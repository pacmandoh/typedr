name: Release Generate Notes

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release_notes:
    name: Generate Release Notes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Changelogithub release
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          registry-url: https://registry.npmjs.org/

      - name: Generate or update release notes
        run: npx --yes changelogithub@latest
        env:
          GITHUB_TOKEN: ${{ github.token }}
